name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: gofmt + build (Linux, cgo/WebKitGTK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Checkout weft-app-core
        uses: actions/checkout@v7
        with:
          repository: openweft/weft-app-core
          path: ../weft-app-core

      - name: Install WebKitGTK + GTK dev libs
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true

      - name: gofmt
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)

      - name: go vet
        run: go vet ./...

      - name: go test
        run: CGO_ENABLED=1 go test ./... -count=1

      - name: Build
        run: CGO_ENABLED=1 go build -o weft-loom-app-linux .
